<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devchauhann/fonts@v1.1.0/cdn/v1/css/all.css">
<title>Editor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--surface:#f7f7f5;--text:#1a1a1a;--muted:#999;--border:#e0e0e0;
  --toolbar-bg:#ffffff;--toolbar-border:#e0e0e0;--toolbar-shadow:0 2px 12px rgba(0,0,0,0.12);
  --btn-hover:#f0f0ee;--accent:#1a1a1a;--sidebar-bg:#fafaf8;
  --font-ui:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;
  --topbar-h:48px;--status-h:32px;
}
body.dark{
  --bg:#141414;--surface:#1e1e1c;--text:#e8e8e4;--muted:#666;--border:#2e2e2c;
  --toolbar-bg:#1e1e1c;--toolbar-border:#333;--toolbar-shadow:0 2px 16px rgba(0,0,0,0.4);
  --btn-hover:#2a2a28;--accent:#e8e8e4;--sidebar-bg:#1a1a18;
}
html,body{height:100%;overflow:hidden}
body{display:flex;flex-direction:column;background:var(--bg);color:var(--text);font-family:var(--font-ui);transition:background .2s,color .2s}

/* TOPBAR */
#topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 12px;height:var(--topbar-h);border-bottom:1px solid var(--border);
  background:var(--bg);flex-shrink:0;gap:6px;
}
#topbar-left,#topbar-right{display:flex;align-items:center;gap:4px}
.top-btn{
  background:none;border:none;color:var(--muted);
  border-radius:8px;padding:7px 8px;font-size:12px;cursor:pointer;
  font-family:var(--font-ui);transition:all .15s;display:flex;align-items:center;gap:5px;white-space:nowrap;
  -webkit-tap-highlight-color:transparent;min-width:32px;min-height:32px;justify-content:center;
}
.top-btn:hover,.top-btn:active{background:var(--btn-hover);color:var(--text)}
.top-btn.active{color:var(--accent)}
.top-btn span{display:none}
@media(min-width:600px){.top-btn span{display:inline}}
select#fontsel{
  background:none;border:none;color:var(--muted);
  border-radius:8px;padding:6px 4px;font-size:12px;cursor:pointer;
  font-family:var(--font-ui);outline:none;max-width:110px;
}
select#fontsel:hover{background:var(--btn-hover);color:var(--text)}

#topbar-reveal{
  display:none;position:fixed;top:0;left:0;right:0;height:4px;
  background:var(--border);cursor:pointer;z-index:100;transition:background .15s;
}
#topbar-reveal:hover{background:var(--muted)}

/* MAIN */
#main{display:flex;flex:1;overflow:hidden;position:relative}

#editor-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;justify-content:center;position:relative}
#line-numbers{
  position:absolute;left:0;top:0;bottom:0;width:40px;
  padding:40px 0 100px;display:none;flex-direction:column;
  align-items:flex-end;gap:0;pointer-events:none;
  font-size:12px;line-height:1.75;color:var(--muted);
  font-family:'Courier New',Courier,monospace;
  user-select:none;
}
@media(min-width:600px){#line-numbers{padding-top:60px;padding-bottom:120px}}
#line-numbers.visible{display:flex}
#line-numbers span{display:block;height:calc(17px * 1.75);padding-right:10px;opacity:.5}
body.font-mono #line-numbers span{height:calc(15px * 1.8)}
/* shift editor right when line numbers visible */
#editor-wrap.with-lines #editor{padding-left:52px}
@media(min-width:600px){#editor-wrap.with-lines #editor{padding-left:60px}}
#editor{
  width:100%;max-width:720px;min-height:100%;
  padding:40px 20px 100px;outline:none;
  font-size:17px;line-height:1.75;color:var(--text);
  caret-color:var(--text);word-break:break-word;
}
@media(min-width:600px){#editor{padding:60px 48px 120px}}
#editor[data-placeholder]:empty::before{content:attr(data-placeholder);color:var(--muted);pointer-events:none}

.font-serif #editor{font-family:'Times New Roman','Times',Georgia,serif}
.font-sans #editor{font-family:'Anthropic Sans',Helvetica,Arial,sans-serif}
.font-mono #editor{font-family:'Courier New',Courier,monospace;font-size:15px;line-height:1.8}

#editor h1{font-size:1.8em;font-weight:700;margin:1.2em 0 .4em;line-height:1.2}
#editor h2{font-size:1.4em;font-weight:700;margin:1em 0 .35em;line-height:1.3}
#editor h3{font-size:1.15em;font-weight:600;margin:.9em 0 .3em}
#editor p{margin:.3em 0}
#editor blockquote{border-left:3px solid var(--border);margin:.6em 0;padding:.3em 0 .3em 1em;color:var(--muted)}
#editor code{font-family:'Courier New',Courier,monospace;font-size:.88em;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:1px 5px}
#editor pre{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1em;margin:.6em 0;overflow-x:auto}
#editor pre code{background:none;border:none;padding:0;font-size:.87em}
#editor ul,#editor ol{padding-left:1.6em;margin:.4em 0}
#editor li{margin:.15em 0}
#editor a{color:#3a7bd5;text-decoration:underline}
#editor strong{font-weight:700}
#editor em{font-style:italic}
#editor hr{border:none;border-top:1px solid var(--border);margin:1.5em 0}

/* SIDEBAR */
#sidebar{
  width:176px;flex-shrink:0;border-left:1px solid var(--border);
  background:var(--sidebar-bg);padding:12px 10px;display:none;flex-direction:column;gap:2px;
  overflow-y:auto;-webkit-overflow-scrolling:touch;order:2;
}
#sidebar.open{display:flex}
/* Mobile: sidebar becomes bottom sheet */
@media(max-width:599px){
  #sidebar{
    position:fixed;bottom:var(--status-h);left:0;right:0;width:100%;
    border-left:none;border-top:1px solid var(--border);
    flex-direction:row;flex-wrap:wrap;padding:8px;gap:4px;
    max-height:200px;overflow-y:auto;z-index:200;order:unset;
  }
  #sidebar .sidebar-label{display:none}
  .sb-btn{width:calc(33.33% - 4px);justify-content:center;flex-direction:column;align-items:center;padding:8px 4px;font-size:11px;gap:3px}
  .sb-btn .icon{font-size:15px}
}
.sidebar-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin:8px 0 2px;padding:0 4px;width:100%}
.sb-btn{
  display:flex;align-items:center;gap:8px;background:none;border:none;
  color:var(--text);font-family:var(--font-ui);font-size:13px;padding:6px 8px;
  border-radius:6px;cursor:pointer;text-align:left;transition:background .1s;width:100%;
  -webkit-tap-highlight-color:transparent;
}
.sb-btn:hover,.sb-btn:active{background:var(--btn-hover)}
.sb-btn .icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--muted);flex-shrink:0}

/* FLOATING TOOLBAR */
#toolbar{
  position:fixed;background:var(--toolbar-bg);border:1px solid var(--toolbar-border);
  border-radius:8px;box-shadow:var(--toolbar-shadow);
  display:none;align-items:center;gap:1px;padding:4px 5px;z-index:999;
}
#toolbar.visible{display:flex}
.tb-btn{
  background:none;border:none;color:var(--text);width:30px;height:30px;
  border-radius:5px;cursor:pointer;font-family:'Georgia',serif;font-size:13px;
  display:flex;align-items:center;justify-content:center;transition:background .1s;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}
.tb-btn:hover,.tb-btn:active{background:var(--btn-hover)}
.tb-sep{width:1px;height:18px;background:var(--border);margin:0 2px;flex-shrink:0}
.tb-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* MODAL */
#modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:2000;
  display:none;align-items:flex-end;justify-content:center;
}
@media(min-width:500px){#modal-overlay{align-items:center}}
#modal-overlay.open{display:flex}
#modal{
  background:var(--bg);border:1px solid var(--border);
  border-radius:16px 16px 0 0;
  padding:24px 20px 32px;width:100%;max-width:420px;
  box-shadow:0 -4px 40px rgba(0,0,0,0.15);position:relative;
}
@media(min-width:500px){#modal{border-radius:12px;padding:28px}}
#modal h3{font-size:15px;font-weight:600;margin-bottom:6px}
#modal p{font-size:13px;color:var(--muted);margin-bottom:18px;line-height:1.5}
.modal-actions{display:flex;gap:8px;flex-direction:column}
.modal-btn{
  width:100%;padding:11px 14px;border-radius:8px;font-size:14px;font-family:var(--font-ui);
  cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);
  transition:all .15s;display:flex;align-items:center;gap:8px;
  -webkit-tap-highlight-color:transparent;
}
.modal-btn:hover,.modal-btn:active{background:var(--btn-hover)}
.modal-btn.primary{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.modal-btn.primary:hover{opacity:.85}
.modal-close{
  position:absolute;top:14px;right:14px;background:none;border:none;
  cursor:pointer;color:var(--muted);font-size:20px;line-height:1;padding:4px;
}
.modal-step{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px}
.modal-step-num{
  width:22px;height:22px;border-radius:50%;background:var(--surface);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;
}

/* TOAST */
#toast{
  position:fixed;bottom:48px;left:50%;transform:translateX(-50%) translateY(12px);
  background:var(--accent);color:var(--bg);padding:9px 18px;border-radius:10px;
  font-size:13px;opacity:0;transition:all .25s;z-index:3000;pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* STATUS BAR */
#status{
  font-size:11px;color:var(--muted);padding:0 16px;height:var(--status-h);
  border-top:1px solid var(--border);background:var(--bg);flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
}
</style>
</head>
<body class="font-serif">

<div id="topbar">
  <div id="topbar-left">
    <select id="fontsel" title="Fonte">
      <option value="font-serif">Serif</option>
      <option value="font-sans">Sans (Anthropic)</option>
      <option value="font-mono">Mono</option>
    </select>
    <button class="top-btn" id="mdToggle"><span>Markdown</span><svg width="13" height="13" viewBox="0 0 16 16" stroke="currentColor" fill="none" stroke-width="1.8"><polyline points="4 6 2 8 4 10"/><polyline points="12 6 14 8 12 10"/><line x1="9" y1="4" x2="7" y2="12"/></svg></button>
  </div>
  <div id="topbar-right">
    <button class="top-btn" id="btnUpload" title="Abrir arquivo">
      <svg width="14" height="14" viewBox="0 0 16 16" stroke="currentColor" fill="none" stroke-width="1.8"><path d="M8 11V3M5 6l3-3 3 3M3 13h10"/></svg>
      <span>Abrir</span>
    </button>
    <input type="file" id="fileInput" accept=".md,.markdown,.txt" style="display:none">
    <button class="top-btn" id="btnDownload" title="Baixar">
      <svg width="14" height="14" viewBox="0 0 16 16" stroke="currentColor" fill="none" stroke-width="1.8"><path d="M8 3v8M5 8l3 3 3-3M3 13h10"/></svg>
      <span>Baixar</span>
    </button>
    <button class="top-btn" id="btnGdocs" title="Google Docs">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M8 10h8M8 14h5"/><path d="M14 2v5h6"/></svg>
      <span>Docs</span>
    </button>
    <button class="top-btn" id="darkToggle" title="Modo escuro">
      <svg width="14" height="14" viewBox="0 0 16 16" stroke="currentColor" fill="none" stroke-width="1.8"><path d="M13 8.5A5.5 5.5 0 0 1 7.5 2a6 6 0 1 0 5.5 6.5z"/></svg>
    </button>
    <button class="top-btn" id="sidebarToggle" title="Ferramentas">
      <svg width="14" height="14" viewBox="0 0 16 16" stroke="currentColor" fill="none" stroke-width="1.8"><line x1="2" y1="4" x2="14" y2="4"/><line x1="2" y1="8" x2="14" y2="8"/><line x1="2" y1="12" x2="14" y2="12"/></svg>
    </button>
    <button class="top-btn" id="lineToggle" title="Números de linha">
      <svg width="14" height="14" viewBox="0 0 16 16" stroke="currentColor" fill="none" stroke-width="1.8"><line x1="6" y1="4" x2="14" y2="4"/><line x1="6" y1="8" x2="14" y2="8"/><line x1="6" y1="12" x2="14" y2="12"/><line x1="2" y1="4" x2="3" y2="4"/><line x1="2" y1="8" x2="3" y2="8"/><line x1="2" y1="12" x2="3" y2="12"/></svg>
    </button>
    <button class="top-btn" id="topbarToggle" title="Ocultar barra">
      <svg width="14" height="14" viewBox="0 0 16 16" stroke="currentColor" fill="none" stroke-width="1.8"><polyline points="4 10 8 6 12 10"/></svg>
    </button>
  </div>
</div>
<div id="topbar-reveal"></div>

<div id="main">
  <div id="editor-wrap">
    <div id="line-numbers"></div>
  <div id="editor" contenteditable="true" spellcheck="true" data-placeholder="Comece a escrever…"></div>
  </div>
  <div id="sidebar">
    <div class="sidebar-label">Formatação</div>
    <button class="sb-btn" data-cmd="bold"><span class="icon" style="font-weight:800">B</span>Negrito</button>
    <button class="sb-btn" data-cmd="italic"><span class="icon" style="font-style:italic">I</span>Itálico</button>
    <button class="sb-btn" data-cmd="underline"><span class="icon" style="text-decoration:underline">S</span>Sublinhado</button>
    <button class="sb-btn" data-cmd="strikeThrough"><span class="icon" style="text-decoration:line-through">S</span>Riscado</button>
    <div class="sidebar-label">Títulos</div>
    <button class="sb-btn" data-cmd="h1"><span class="icon">H1</span>Título 1</button>
    <button class="sb-btn" data-cmd="h2"><span class="icon">H2</span>Título 2</button>
    <button class="sb-btn" data-cmd="h3"><span class="icon">H3</span>Título 3</button>
    <div class="sidebar-label">Blocos</div>
    <button class="sb-btn" data-cmd="insertUnorderedList"><span class="icon">•</span>Lista</button>
    <button class="sb-btn" data-cmd="insertOrderedList"><span class="icon">1.</span>Numerada</button>
    <button class="sb-btn" data-cmd="blockquote"><span class="icon">"</span>Citação</button>
    <button class="sb-btn" data-cmd="code"><span class="icon">&lt;/&gt;</span>Código</button>
    <div class="sidebar-label">Inserir</div>
    <button class="sb-btn" data-cmd="createLink"><span class="icon">🔗</span>Link</button>
    <button class="sb-btn" data-cmd="hr"><span class="icon">—</span>Divisor</button>
    <div class="sidebar-label">Exportar</div>
    <button class="sb-btn" id="sb-docx"><span class="icon">📄</span>DOC</button>
    <button class="sb-btn" id="sb-pdf"><span class="icon">📑</span>PDF</button>
    <button class="sb-btn" id="sb-html"><span class="icon">💾</span>HTML</button>
    <button class="sb-btn" id="sb-gdocs"><span class="icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M8 10h8M8 14h5"/><path d="M14 2v5h6"/></svg></span>Docs</button>
  </div>
</div>

<div id="toolbar">
  <button class="tb-btn" data-cmd="bold"><b>B</b></button>
  <button class="tb-btn" data-cmd="italic"><i>I</i></button>
  <button class="tb-btn" data-cmd="underline"><u>U</u></button>
  <button class="tb-btn" data-cmd="strikeThrough"><s>S</s></button>
  <div class="tb-sep"></div>
  <button class="tb-btn" data-cmd="h1" style="font-size:11px;font-weight:700">H1</button>
  <button class="tb-btn" data-cmd="h2" style="font-size:11px;font-weight:700">H2</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" data-cmd="insertUnorderedList">
    <svg viewBox="0 0 16 16"><line x1="6" y1="4" x2="14" y2="4"/><line x1="6" y1="8" x2="14" y2="8"/><line x1="6" y1="12" x2="14" y2="12"/><circle cx="2.5" cy="4" r="1" fill="currentColor" stroke="none"/><circle cx="2.5" cy="8" r="1" fill="currentColor" stroke="none"/><circle cx="2.5" cy="12" r="1" fill="currentColor" stroke="none"/></svg>
  </button>
  <button class="tb-btn" data-cmd="blockquote" style="font-size:15px">"</button>
  <button class="tb-btn" data-cmd="createLink">
    <svg viewBox="0 0 16 16"><path d="M7 9a3.5 3.5 0 0 0 5 0l2-2a3.5 3.5 0 0 0-5-5L7.5 3.5"/><path d="M9 7a3.5 3.5 0 0 0-5 0L2 9a3.5 3.5 0 0 0 5 5l1.5-1.5"/></svg>
  </button>
</div>

<div id="modal-overlay">
  <div id="modal">
    <button class="modal-close" id="modal-close-btn">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<div id="toast"></div>

<div id="status">
  <span id="statusLeft">Pronto</span>
  <span id="wordcount">0 palavras</span>
  <span id="statusRight"></span>
</div>

<script>
const editor=document.getElementById('editor');
const toolbar=document.getElementById('toolbar');
const sidebar=document.getElementById('sidebar');
const wordcount=document.getElementById('wordcount');
const statusLeft=document.getElementById('statusLeft');
const statusRight=document.getElementById('statusRight');
const body=document.body;
const modalOverlay=document.getElementById('modal-overlay');
const modalContent=document.getElementById('modal-content');
const toast=document.getElementById('toast');
const topbar=document.getElementById('topbar');
const topbarReveal=document.getElementById('topbar-reveal');

let mdMode=false,saveTimer=null;

function showToast(msg,dur=2200){
  toast.textContent=msg;toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),dur);
}
function openModal(html){modalContent.innerHTML=html;modalOverlay.classList.add('open')}
function closeModal(){modalOverlay.classList.remove('open')}
document.getElementById('modal-close-btn').addEventListener('click',closeModal);
modalOverlay.addEventListener('click',e=>{if(e.target===modalOverlay)closeModal()});

function countWords(){
  const txt=editor.innerText||'';
  const words=txt.trim().split(/\s+/).filter(w=>w.length>0);
  wordcount.textContent=words.length===0?'0 palavras':`${words.length} palavra${words.length!==1?'s':''}`;
  statusRight.textContent=`${txt.replace(/\s/g,'').length} car.`;
}
function autoSave(){
  clearTimeout(saveTimer);statusLeft.textContent='…';
  saveTimer=setTimeout(()=>{
    try{localStorage.setItem('editor_content',editor.innerHTML);}catch(e){}
    statusLeft.textContent='Salvo';
    setTimeout(()=>{statusLeft.textContent='Pronto';},1500);
  },800);
}

try{const s=localStorage.getItem('editor_content');if(s)editor.innerHTML=s;}catch(e){}
countWords();

function execCmd(cmd){
  editor.focus();
  if(['h1','h2','h3'].includes(cmd)){document.execCommand('formatBlock',false,cmd);}
  else if(cmd==='blockquote'){document.execCommand('formatBlock',false,'blockquote');}
  else if(cmd==='code'){
    const sel=window.getSelection();
    if(sel&&sel.toString()){const r=sel.getRangeAt(0);const c=document.createElement('code');try{r.surroundContents(c);}catch(e){}}
  }
  else if(cmd==='hr'){document.execCommand('insertHTML',false,'<hr>');}
  else if(cmd==='createLink'){const u=prompt('URL do link:');if(u)document.execCommand('createLink',false,u);}
  else{document.execCommand(cmd,false,null);}
  countWords();autoSave();
}

document.querySelectorAll('[data-cmd]').forEach(btn=>{
  btn.addEventListener('mousedown',e=>{e.preventDefault();execCmd(btn.dataset.cmd);});
  btn.addEventListener('touchend',e=>{e.preventDefault();execCmd(btn.dataset.cmd);});
});

function positionToolbar(){
  const sel=window.getSelection();
  if(!sel||sel.rangeCount===0||sel.isCollapsed){toolbar.classList.remove('visible');return;}
  const rect=sel.getRangeAt(0).getBoundingClientRect();
  if(rect.width===0){toolbar.classList.remove('visible');return;}
  toolbar.classList.add('visible');
  const tw=toolbar.offsetWidth,th=toolbar.offsetHeight;
  let left=rect.left+(rect.width-tw)/2;
  left=Math.max(8,Math.min(left,window.innerWidth-tw-8));
  let top=rect.bottom+8+window.scrollY;
  if(top+th>window.innerHeight+window.scrollY-8)top=rect.top-th-8+window.scrollY;
  toolbar.style.left=left+'px';toolbar.style.top=top+'px';
}
document.addEventListener('selectionchange',()=>{
  const sel=window.getSelection();
  if(!sel||sel.isCollapsed){setTimeout(()=>{const s=window.getSelection();if(!s||s.isCollapsed)toolbar.classList.remove('visible');},120);return;}
  if(editor.contains(sel.anchorNode))positionToolbar();
});
document.addEventListener('mouseup',()=>setTimeout(positionToolbar,10));
document.addEventListener('touchend',()=>setTimeout(positionToolbar,200));
editor.addEventListener('keyup',()=>{countWords();autoSave();});
editor.addEventListener('input',()=>{countWords();autoSave();});

document.getElementById('darkToggle').addEventListener('click',()=>{
  body.classList.toggle('dark');
  try{localStorage.setItem('dark_mode',body.classList.contains('dark')?'1':'0');}catch(e){}
});
try{if(localStorage.getItem('dark_mode')==='1')body.classList.add('dark');}catch(e){}

document.getElementById('sidebarToggle').addEventListener('click',function(){
  sidebar.classList.toggle('open');this.classList.toggle('active');
});

document.getElementById('fontsel').addEventListener('change',function(){
  body.className=body.className.replace(/font-\w+/g,'').trim();
  body.classList.add(this.value);

/* MD CONVERSIONS */
function mdToHtml(md){
  if(!md)return'';
  let h=md.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  h=h.replace(/^#{3} (.+)$/gm,'<h3>$1</h3>');
  h=h.replace(/^#{2} (.+)$/gm,'<h2>$1</h2>');
  h=h.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  h=h.replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>');
  h=h.replace(/^---+$/gm,'<hr>');
  h=h.replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>');
  h=h.replace(/`([^`]+)`/g,'<code>$1</code>');
  h=h.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
  h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  h=h.replace(/__(.+?)__/g,'<strong>$1</strong>');
  h=h.replace(/\*(.+?)\*/g,'<em>$1</em>');
  h=h.replace(/_(.+?)_/g,'<em>$1</em>');
  h=h.replace(/~~(.+?)~~/g,'<s>$1</s>');
  h=h.replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2">$1</a>');
  const lines=h.split('\n');const out=[];let inUl=false,inOl=false;
  for(let l of lines){
    if(/^<(h[123]|blockquote|hr|pre)/.test(l)){if(inUl){out.push('</ul>');inUl=false;}if(inOl){out.push('</ol>');inOl=false;}out.push(l);}
    else if(/^[*\-] (.+)$/.test(l)){if(!inUl){out.push('<ul>');inUl=true;}out.push('<li>'+l.replace(/^[*\-] /,'')+'</li>');}
    else if(/^\d+\. (.+)$/.test(l)){if(!inOl){out.push('<ol>');inOl=true;}out.push('<li>'+l.replace(/^\d+\. /,'')+'</li>');}
    else{if(inUl){out.push('</ul>');inUl=false;}if(inOl){out.push('</ol>');inOl=false;}out.push(l===''?'<br>':'<p>'+l+'</p>');}
  }
  if(inUl)out.push('</ul>');if(inOl)out.push('</ol>');
  return out.join('\n');
}
function htmlToMd(html){
  const d=document.createElement('div');d.innerHTML=html;
  function walk(n){
    if(n.nodeType===3)return n.textContent;
    const tag=n.tagName&&n.tagName.toLowerCase();
    const inner=Array.from(n.childNodes).map(walk).join('');
    if(tag==='h1')return'# '+inner+'\n';if(tag==='h2')return'## '+inner+'\n';if(tag==='h3')return'### '+inner+'\n';
    if(tag==='strong'||tag==='b')return'**'+inner+'**';if(tag==='em'||tag==='i')return'*'+inner+'*';
    if(tag==='s')return'~~'+inner+'~~';if(tag==='code')return'`'+inner+'`';
    if(tag==='pre')return'```\n'+n.innerText+'\n```\n';
    if(tag==='blockquote')return'> '+inner+'\n';
    if(tag==='a')return'['+inner+']('+n.href+')';
    if(tag==='li')return'- '+inner+'\n';if(tag==='ul'||tag==='ol')return inner+'\n';
    if(tag==='hr')return'---\n';if(tag==='br')return'\n';
    if(tag==='p'||tag==='div')return inner+'\n';
    return inner;
  }
  return Array.from(d.childNodes).map(walk).join('').replace(/\n{3,}/g,'\n\n').trim();
}

function downloadHtml(){

function downloadDocx(){
  const txt=editor.innerText||'';
  let rtf='{\\rtf1\\ansi\\deff0{\\fonttbl{\\f0 Times New Roman;}}\\f0\\fs34 ';

<script>
const editor=document.getElementById('editor');
const toolbar=document.getElementById('toolbar');
const sidebar=document.getElementById('sidebar');
const wordcount=document.getElementById('wordcount');
const statusLeft=document.getElementById('statusLeft');
const statusRight=document.getElementById('statusRight');
const body=document.body;
const modalOverlay=document.getElementById('modal-overlay');
const modalContent=document.getElementById('modal-content');
const toast=document.getElementById('toast');
const topbar=document.getElementById('topbar');
const topbarReveal=document.getElementById('topbar-reveal');

let mdMode=false,saveTimer=null;

function showToast(msg,dur=2200){
  toast.textContent=msg;toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),dur);
}
function openModal(html){modalContent.innerHTML=html;modalOverlay.classList.add('open')}
function closeModal(){modalOverlay.classList.remove('open')}
document.getElementById('modal-close-btn').addEventListener('click',closeModal);
modalOverlay.addEventListener('click',e=>{if(e.target===modalOverlay)closeModal()});

function countWords(){
  const txt=editor.innerText||'';
  const words=txt.trim().split(/\s+/).filter(w=>w.length>0);
  wordcount.textContent=words.length===0?'0 palavras':`${words.length} palavra${words.length!==1?'s':''}`;
  statusRight.textContent=`${txt.replace(/\s/g,'').length} car.`;
}
function autoSave(){
  clearTimeout(saveTimer);statusLeft.textContent='…';
  saveTimer=setTimeout(()=>{
    try{localStorage.setItem('editor_content',editor.innerHTML);}catch(e){}
    statusLeft.textContent='Salvo';
    setTimeout(()=>{statusLeft.textContent='Pronto';},1500);
  },800);
}

try{const s=localStorage.getItem('editor_content');if(s)editor.innerHTML=s;}catch(e){}
countWords();

function execCmd(cmd){
  editor.focus();
  if(['h1','h2','h3'].includes(cmd)){document.execCommand('formatBlock',false,cmd);}
  else if(cmd==='blockquote'){document.execCommand('formatBlock',false,'blockquote');}
  else if(cmd==='code'){
    const sel=window.getSelection();
    if(sel&&sel.toString()){const r=sel.getRangeAt(0);const c=document.createElement('code');try{r.surroundContents(c);}catch(e){}}
  }
  else if(cmd==='hr'){document.execCommand('insertHTML',false,'<hr>');}
  else if(cmd==='createLink'){const u=prompt('URL do link:');if(u)document.execCommand('createLink',false,u);}
  else{document.execCommand(cmd,false,null);}
  countWords();autoSave();
}

document.querySelectorAll('[data-cmd]').forEach(btn=>{
  btn.addEventListener('mousedown',e=>{e.preventDefault();execCmd(btn.dataset.cmd);});
  btn.addEventListener('touchend',e=>{e.preventDefault();execCmd(btn.dataset.cmd);});
});

function positionToolbar(){
  const sel=window.getSelection();
  if(!sel||sel.rangeCount===0||sel.isCollapsed){toolbar.classList.remove('visible');return;}
  const rect=sel.getRangeAt(0).getBoundingClientRect();
  if(rect.width===0){toolbar.classList.remove('visible');return;}
  toolbar.classList.add('visible');
  const tw=toolbar.offsetWidth,th=toolbar.offsetHeight;
  let left=rect.left+(rect.width-tw)/2;
  left=Math.max(8,Math.min(left,window.innerWidth-tw-8));
  let top=rect.top-th-8+window.scrollY;
  if(top<8)top=rect.bottom+8+window.scrollY;
  toolbar.style.left=left+'px';toolbar.style.top=top+'px';
}
document.addEventListener('selectionchange',()=>{
  const sel=window.getSelection();
  if(!sel||sel.isCollapsed){setTimeout(()=>{const s=window.getSelection();if(!s||s.isCollapsed)toolbar.classList.remove('visible');},120);return;}
  if(editor.contains(sel.anchorNode))positionToolbar();
});
document.addEventListener('mouseup',()=>setTimeout(positionToolbar,10));
document.addEventListener('touchend',()=>setTimeout(positionToolbar,200));
editor.addEventListener('keyup',()=>{countWords();autoSave();});
editor.addEventListener('input',()=>{countWords();autoSave();});

document.getElementById('darkToggle').addEventListener('click',()=>{
  body.classList.toggle('dark');
  try{localStorage.setItem('dark_mode',body.classList.contains('dark')?'1':'0');}catch(e){}
});
try{if(localStorage.getItem('dark_mode')==='1')body.classList.add('dark');}catch(e){}

document.getElementById('sidebarToggle').addEventListener('click',function(){
  sidebar.classList.toggle('open');this.classList.toggle('active');
});

document.getElementById('fontsel').addEventListener('change',function(){
  body.className=body.className.replace(/font-\w+/g,'').trim();
  body.classList.add(this.value);
  try{localStorage.setItem('editor_font',this.value);}catch(e){}
});
try{const f=localStorage.getItem('editor_font');if(f){body.className=body.className.replace(/font-\w+/g,'').trim();body.classList.add(f);document.getElementById('fontsel').value=f;}}catch(e){}

document.getElementById('mdToggle').addEventListener('click',function(){
  mdMode=!mdMode;this.classList.toggle('active',mdMode);
  if(mdMode){editor.innerText=htmlToMd(editor.innerHTML);}
  else{editor.innerHTML=mdToHtml(editor.innerText);}
  countWords();
});

/* LINE NUMBERS */
const lineNumbers=document.getElementById('line-numbers');
const editorWrap=document.getElementById('editor-wrap');
let showLines=false;

function updateLineNumbers(){
  if(!showLines)return;
  const lines=editor.innerText.split('\n');
  const count=Math.max(lines.length,1);
  lineNumbers.innerHTML=Array.from({length:count},(_,i)=>`<span>${i+1}</span>`).join('');
}

document.getElementById('lineToggle').addEventListener('click',function(){
  showLines=!showLines;
  this.classList.toggle('active',showLines);
  lineNumbers.classList.toggle('visible',showLines);
  editorWrap.classList.toggle('with-lines',showLines);
  if(showLines)updateLineNumbers();
});

editor.addEventListener('input',()=>{countWords();autoSave();updateLineNumbers();});
editor.addEventListener('keyup',()=>{countWords();autoSave();updateLineNumbers();});

document.getElementById('topbarToggle').addEventListener('click',()=>{
  topbar.style.display='none';topbarReveal.style.display='block';
});
topbarReveal.addEventListener('click',()=>{
  topbar.style.display='';topbarReveal.style.display='none';
});

/* UPLOAD */
document.getElementById('btnUpload').addEventListener('click',()=>document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change',function(){
  const file=this.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const md=e.target.result;
    if(mdMode){editor.innerText=md;}else{editor.innerHTML=mdToHtml(md);}
    countWords();autoSave();showToast(`"${file.name}" aberto ✓`);
  };
  reader.readAsText(file,'UTF-8');this.value='';
});

/* MD CONVERSIONS */
function mdToHtml(md){
  if(!md)return'';
  let h=md.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  h=h.replace(/^#{3} (.+)$/gm,'<h3>$1</h3>');
  h=h.replace(/^#{2} (.+)$/gm,'<h2>$1</h2>');
  h=h.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  h=h.replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>');
  h=h.replace(/^---+$/gm,'<hr>');
  h=h.replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>');
  h=h.replace(/`([^`]+)`/g,'<code>$1</code>');
  h=h.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
  h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  h=h.replace(/__(.+?)__/g,'<strong>$1</strong>');
  h=h.replace(/\*(.+?)\*/g,'<em>$1</em>');
  h=h.replace(/_(.+?)_/g,'<em>$1</em>');
  h=h.replace(/~~(.+?)~~/g,'<s>$1</s>');
  h=h.replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2">$1</a>');
  const lines=h.split('\n');const out=[];let inUl=false,inOl=false;
  for(let l of lines){
    if(/^<(h[123]|blockquote|hr|pre)/.test(l)){if(inUl){out.push('</ul>');inUl=false;}if(inOl){out.push('</ol>');inOl=false;}out.push(l);}
    else if(/^[*\-] (.+)$/.test(l)){if(!inUl){out.push('<ul>');inUl=true;}out.push('<li>'+l.replace(/^[*\-] /,'')+'</li>');}
    else if(/^\d+\. (.+)$/.test(l)){if(!inOl){out.push('<ol>');inOl=true;}out.push('<li>'+l.replace(/^\d+\. /,'')+'</li>');}
    else{if(inUl){out.push('</ul>');inUl=false;}if(inOl){out.push('</ol>');inOl=false;}out.push(l===''?'<br>':'<p>'+l+'</p>');}
  }
  if(inUl)out.push('</ul>');if(inOl)out.push('</ol>');
  return out.join('\n');
}
function htmlToMd(html){
  const d=document.createElement('div');d.innerHTML=html;
  function walk(n){
    if(n.nodeType===3)return n.textContent;
    const tag=n.tagName&&n.tagName.toLowerCase();
    const inner=Array.from(n.childNodes).map(walk).join('');
    if(tag==='h1')return'# '+inner+'\n';if(tag==='h2')return'## '+inner+'\n';if(tag==='h3')return'### '+inner+'\n';
    if(tag==='strong'||tag==='b')return'**'+inner+'**';if(tag==='em'||tag==='i')return'*'+inner+'*';
    if(tag==='s')return'~~'+inner+'~~';if(tag==='code')return'`'+inner+'`';
    if(tag==='pre')return'```\n'+n.innerText+'\n```\n';
    if(tag==='blockquote')return'> '+inner+'\n';
    if(tag==='a')return'['+inner+']('+n.href+')';
    if(tag==='li')return'- '+inner+'\n';if(tag==='ul'||tag==='ol')return inner+'\n';
    if(tag==='hr')return'---\n';if(tag==='br')return'\n';
    if(tag==='p'||tag==='div')return inner+'\n';
    return inner;
  }
  return Array.from(d.childNodes).map(walk).join('').replace(/\n{3,}/g,'\n\n').trim();
}

/* EXPORT */
function getCurrentFont(){
  if(body.classList.contains('font-sans'))return"'Helvetica Neue',Helvetica,Arial,sans-serif";
  if(body.classList.contains('font-mono'))return"'Courier New',Courier,monospace";
  return"'Times New Roman',Times,Georgia,serif";
}
function buildFullHtml(){
  return`<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><style>
body{font-family:${getCurrentFont()};font-size:17px;line-height:1.75;max-width:720px;margin:60px auto;padding:0 40px;color:#1a1a1a;}
h1{font-size:2em;font-weight:700;margin:1.2em 0 .4em}h2{font-size:1.5em;font-weight:700;margin:1em 0 .35em}h3{font-size:1.2em;font-weight:600;margin:.9em 0 .3em}
blockquote{border-left:3px solid #e0e0e0;margin:.6em 0;padding:.3em 1em;color:#888}
code{font-family:'Courier New',monospace;font-size:.88em;background:#f7f7f5;border:1px solid #e0e0e0;border-radius:4px;padding:1px 5px}
pre{background:#f7f7f5;border:1px solid #e0e0e0;border-radius:8px;padding:1em;overflow-x:auto}
pre code{background:none;border:none;padding:0}hr{border:none;border-top:1px solid #e0e0e0;margin:1.5em 0}
ul,ol{padding-left:1.6em}a{color:#3a7bd5}
</style></head><body>${editor.innerHTML}</body></html>`;
}
function downloadHtml(){
  const blob=new Blob([buildFullHtml()],{type:'text/html'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='documento.html';a.click();
  showToast('HTML baixado ✓');closeModal();
}
function downloadPdf(){
  const w=window.open('','_blank');
  if(!w){showToast('Permita pop-ups para exportar PDF');return;}
  w.document.write(buildFullHtml());w.document.close();
  w.onload=()=>w.print();
  showToast('Salve como PDF na caixa de impressão');closeModal();
}
function downloadDocx(){
  const txt=editor.innerText||'';
  let rtf='{\\rtf1\\ansi\\deff0{\\fonttbl{\\f0 Times New Roman;}}\\f0\\fs34 ';
  for(let l of txt.split('\n')){rtf+=l.replace(/[\\{}]/g,'\\$&')+' \\par ';}
  rtf+='}';
  const blob=new Blob([rtf],{type:'application/msword'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='documento.doc';a.click();
  showToast('Documento baixado ✓');closeModal();
}

function showDownloadModal(){
  openModal(`
    <h3>Baixar documento</h3>
    <p>Escolha o formato:</p>
    <div class="modal-actions">
      <button class="modal-btn" id="dl-pdf">
        <svg width="16" height="16" viewBox="0 0 16 16" stroke="currentColor" fill="none" stroke-width="1.8"><rect x="2" y="1" width="12" height="14" rx="2"/><path d="M5 6h6M5 9h4"/></svg>PDF — via impressão
      </button>
      <button class="modal-btn" id="dl-docx">
        <svg width="16" height="16" viewBox="0 0 16 16" stroke="currentColor" fill="none" stroke-width="1.8"><rect x="2" y="1" width="12" height="14" rx="2"/><path d="M5 6h6M5 9h6M5 12h3"/></svg>DOC — Word / Google Docs
      </button>
      <button class="modal-btn" id="dl-html">
        <svg width="16" height="16" viewBox="0 0 16 16" stroke="currentColor" fill="none" stroke-width="1.8"><polyline points="4 6 2 8 4 10"/><polyline points="12 6 14 8 12 10"/><line x1="9" y1="4" x2="7" y2="12"/></svg>HTML
      </button>
    </div>
  `);
  document.getElementById('dl-pdf').addEventListener('click',downloadPdf);
  document.getElementById('dl-docx').addEventListener('click',downloadDocx);
  document.getElementById('dl-html').addEventListener('click',downloadHtml);
}
function showGdocsModal(){
  openModal(`
    <h3>Exportar para Google Docs</h3>
    <p>Siga os passos para abrir no Google Docs:</p>
    <div class="modal-step"><div class="modal-step-num">1</div><span style="font-size:13px;line-height:1.5">Baixe o arquivo <b>.doc</b> abaixo</span></div>
    <div class="modal-step"><div class="modal-step-num">2</div><span style="font-size:13px;line-height:1.5">Acesse <a href="https://drive.google.com" target="_blank" style="color:#3a7bd5">drive.google.com</a> → <b>Novo → Upload de arquivo</b></span></div>
    <div class="modal-step"><div class="modal-step-num">3</div><span style="font-size:13px;line-height:1.5">Clique duas vezes no arquivo → <b>Abrir com Google Docs</b></span></div>
    <div class="modal-actions" style="margin-top:18px">
      <button class="modal-btn" id="gdocs-cancel">Cancelar</button>
      <button class="modal-btn primary" id="gdocs-download">
        <svg width="14" height="14" viewBox="0 0 16 16" stroke="currentColor" fill="none" stroke-width="1.8"><path d="M8 2v8M5 7l3 3 3-3M3 12h10"/></svg>Baixar .doc
      </button>
    </div>
  `);
  document.getElementById('gdocs-cancel').addEventListener('click',closeModal);
  document.getElementById('gdocs-download').addEventListener('click',downloadDocx);
}

document.getElementById('btnDownload').addEventListener('click',showDownloadModal);
document.getElementById('btnGdocs').addEventListener('click',showGdocsModal);
document.getElementById('sb-docx').addEventListener('mousedown',e=>{e.preventDefault();downloadDocx();});
document.getElementById('sb-pdf').addEventListener('mousedown',e=>{e.preventDefault();downloadPdf();});
document.getElementById('sb-html').addEventListener('mousedown',e=>{e.preventDefault();downloadHtml();});
document.getElementById('sb-gdocs').addEventListener('mousedown',e=>{e.preventDefault();showGdocsModal();});
</script>
